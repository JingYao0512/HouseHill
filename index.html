<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Content Security Policy — locks down what the browser may load.
      Note: frame-ancestors / report-* / sandbox only work as HTTP headers,
      not in <meta>. GitHub Pages can't set headers, so anti-clickjacking
      is enforced by the small frame-bust script in src/main.tsx instead.
    -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: blob:;
      connect-src 'self' https://househill.de.r.appspot.com;
      object-src 'none';
      base-uri 'self';
      form-action 'self';
    " />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>HouseHill Summit — 醫療X光軟體指引平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
