<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HouseHill</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --border-light: #f1f5f9;
      --text: #1e293b;
      --text-secondary: #64748b;
      --text-muted: #94a3b8;
      --primary: #3b82f6;
      --primary-bg: #eff6ff;
      --primary-border: #bfdbfe;
      --primary-dark: #1e40af;
      --header-bg: #0f172a;
      --header-secondary: #1e293b;
      --green: #16a34a;
      --green-bg: #f0fdf4;
      --green-border: #bbf7d0;
      --red: #ef4444;
      --red-bg: #fef2f2;
      --red-border: #fecaca;
      --amber: #d97706;
      --amber-bg: #fffbeb;
      --amber-border: #fde68a;
      --purple: #7c3aed;
      --purple-bg: #f5f3ff;
      --purple-border: #ddd6fe;
      --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.05);
      --shadow: 0 1px 3px 0 rgba(0,0,0,0.1), 0 1px 2px -1px rgba(0,0,0,0.1);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: var(--header-bg);
      color: white;
      padding: 16px 32px;
      box-shadow: var(--shadow-md);
      flex-shrink: 0;
      z-index: 10;
    }
    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .header-title-group { display: flex; align-items: center; gap: 14px; }
    .header-icon {
      width: 44px; height: 44px;
      background: rgba(59,130,246,0.15);
      border: 1px solid rgba(59,130,246,0.3);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .header-title { font-size: 20px; font-weight: 700; }
    .header-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* ── Top Navigation ── */
    .top-nav { display: flex; gap: 4px; }
    .top-nav-btn {
      background: transparent; border: 1px solid transparent;
      color: var(--text-muted); padding: 7px 18px;
      border-radius: var(--radius-sm); font-size: 13px;
      font-weight: 600; font-family: inherit; cursor: pointer;
      transition: all 0.15s; display: flex; align-items: center; gap: 6px;
      text-decoration: none;
    }
    .top-nav-btn:hover { color: white; background: rgba(255,255,255,0.08); }
    .top-nav-btn.active {
      color: white; background: rgba(59,130,246,0.2);
      border-color: rgba(59,130,246,0.4);
    }

    .header-right { display: flex; align-items: center; gap: 12px; }
    .user-info { display: flex; align-items: center; gap: 8px; }
    .user-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: rgba(59,130,246,0.25); border: 1px solid rgba(59,130,246,0.4);
      color: #93c5fd; font-size: 13px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .user-name { font-size: 13px; color: #94a3b8; font-weight: 500; }
    .logout-btn {
      display: flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; border-radius: 6px;
      color: #64748b; text-decoration: none; font-size: 15px;
      transition: all 0.15s; cursor: pointer; background: none; border: none;
    }
    .logout-btn:hover { background: rgba(239,68,68,0.15); color: #f87171; }
    .search-wrap { position: relative; }
    .search-wrap input {
      background: var(--header-secondary);
      color: white;
      border: 1px solid #334155;
      padding: 9px 14px 9px 38px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      width: 280px;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .search-wrap input::placeholder { color: var(--text-muted); }
    .search-wrap input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59,130,246,0.2); }
    .search-wrap svg {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); width: 16px; height: 16px;
    }

    /* ── Page Container ── */
    .page-container { display: none; flex: 1; overflow: hidden; }
    .page-container.active { display: flex; flex-direction: column; flex: 1; }

    /* ── Layout ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── Sidebar ── */
    nav.sidebar {
      width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 20px 16px;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .sidebar-label {
      font-size: 11px; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 1px;
      padding: 0 8px; margin-bottom: 12px;
    }
    .tab-list { display: flex; flex-direction: column; gap: 2px; }
    .tab-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      background: none;
      font-size: 14px; font-weight: 500; font-family: inherit;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
      width: 100%;
    }
    .tab-btn:hover { background: var(--bg); }
    .tab-btn.active {
      background: var(--primary-bg);
      color: var(--primary-dark);
      border-color: var(--primary-border);
      box-shadow: var(--shadow-sm);
    }
    .tab-btn .tab-icon { font-size: 18px; width: 22px; text-align: center; flex-shrink: 0; }
    .tab-btn .tab-count {
      margin-left: auto;
      font-size: 11px; color: var(--text-muted);
      background: var(--bg); padding: 2px 8px;
      border-radius: 20px;
    }
    .tab-btn.active .tab-count { background: rgba(59,130,246,0.1); color: var(--primary); }

    /* ── Tip Box ── */
    .tip-box {
      margin-top: 28px;
      background: var(--amber-bg);
      border: 1px solid var(--amber-border);
      border-radius: var(--radius-sm);
      padding: 14px;
    }
    .tip-box .tip-header {
      display: flex; align-items: center; gap: 6px;
      color: var(--amber); font-size: 11px;
      font-weight: 700; text-transform: uppercase;
      margin-bottom: 8px;
    }
    .tip-box p { font-size: 12px; color: #92400e; line-height: 1.6; }

    /* ── Main Content ── */
    main.content {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
    }

    .breadcrumb {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--text-muted);
      margin-bottom: 20px;
    }
    .breadcrumb .current { font-weight: 600; color: var(--text); font-size: 18px; }
    .breadcrumb svg { width: 14px; height: 14px; }

    .status-bar {
      display: flex; justify-content: flex-end; margin-bottom: 12px;
    }
    .status-pill {
      font-size: 12px; font-weight: 500; color: var(--text-muted);
      background: var(--surface); border: 1px solid var(--border);
      padding: 4px 14px; border-radius: 20px;
    }

    /* ── Section Card ── */
    .section-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      margin-bottom: 20px;
    }
    .section-header {
      background: #f8fafc;
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 700; color: var(--text-secondary);
    }
    .section-header svg { width: 16px; height: 16px; }

    /* ── Table ── */
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: var(--bg); border-bottom: 1px solid var(--border); }
    th {
      padding: 12px 16px;
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; color: var(--text-muted);
      text-align: left;
      white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid var(--border-light); transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(59,130,246,0.03); }
    td { padding: 12px 16px; vertical-align: top; font-size: 14px; }

    .key-badge {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12.5px; font-weight: 500;
      color: var(--primary-dark);
      background: var(--primary-bg);
      border: 1px solid var(--primary-border);
      padding: 3px 10px;
      border-radius: 6px;
      word-break: break-all;
      box-shadow: var(--shadow-sm);
    }
    .key-badge.clickable { cursor: pointer; transition: all 0.15s; }
    .key-badge.clickable:hover { background: var(--primary-border); }
    .desc-text { font-size: 13px; color: var(--text); line-height: 1.5; white-space: pre-line; }
    .attr-pill {
      display: inline-block;
      font-size: 11px; font-weight: 600;
      color: var(--purple);
      background: var(--purple-bg);
      border: 1px solid var(--purple-border);
      padding: 2px 10px; border-radius: 20px;
    }
    .range-pill {
      display: inline-block;
      font-size: 12px; color: var(--text-secondary);
      background: var(--bg); border: 1px solid var(--border);
      padding: 3px 10px; border-radius: 20px;
      white-space: pre-line; line-height: 1.5;
    }
    .val-yes {
      display: inline-block;
      font-size: 12px; font-weight: 700;
      color: var(--green); background: var(--green-bg);
      border: 1px solid var(--green-border);
      padding: 3px 10px; border-radius: 6px;
    }
    .val-no {
      display: inline-block;
      font-size: 12px; font-weight: 700;
      color: var(--red); background: var(--red-bg);
      border: 1px solid var(--red-border);
      padding: 3px 10px; border-radius: 6px;
    }
    .val-default { font-size: 13px; font-weight: 600; color: var(--text); }
    .val-empty { color: var(--text-muted); }
    .ui-yes {
      display: inline-block;
      font-size: 10px; font-weight: 700;
      color: var(--green); background: var(--green-bg);
      border: 1px solid var(--green-border);
      padding: 2px 8px; border-radius: 4px;
      letter-spacing: 0.5px;
    }

    .no-results {
      text-align: center; padding: 60px 20px; color: var(--text-muted);
    }
    .no-results svg { width: 40px; height: 40px; margin: 0 auto 12px; color: #cbd5e1; }

    /* ── Issues Styles ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px; margin-bottom: 24px;
    }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px;
      box-shadow: var(--shadow-sm); position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 3px;
    }
    .stat-card.total::before { background: var(--primary); }
    .stat-card.open::before { background: var(--amber); }
    .stat-card.in-progress::before { background: var(--purple); }
    .stat-card.resolved::before { background: var(--green); }
    .stat-value { font-size: 36px; font-weight: 700; line-height: 1; }
    .stat-label { font-size: 13px; color: var(--text-secondary); margin-top: 6px; font-weight: 500; }

    .severity-badge {
      display: inline-block; font-size: 11px; font-weight: 700;
      padding: 2px 10px; border-radius: 20px; text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .severity-critical { color: var(--red); background: var(--red-bg); border: 1px solid var(--red-border); }
    .severity-high { color: var(--amber); background: var(--amber-bg); border: 1px solid var(--amber-border); }
    .severity-medium { color: var(--primary); background: var(--primary-bg); border: 1px solid var(--primary-border); }
    .severity-low { color: var(--green); background: var(--green-bg); border: 1px solid var(--green-border); }

    .status-badge {
      display: inline-block; font-size: 11px; font-weight: 600;
      padding: 2px 10px; border-radius: 20px;
    }
    .status-open { color: var(--amber); background: var(--amber-bg); border: 1px solid var(--amber-border); }
    .status-in-progress { color: var(--purple); background: var(--purple-bg); border: 1px solid var(--purple-border); }
    .status-resolved { color: var(--green); background: var(--green-bg); border: 1px solid var(--green-border); }

    .bar-chart { margin-bottom: 24px; }
    .bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .bar-label { width: 80px; font-size: 13px; font-weight: 600; text-align: right; }
    .bar-track { flex: 1; height: 24px; background: var(--bg); border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; min-width: 2px; }
    .bar-count { width: 30px; font-size: 13px; font-weight: 600; color: var(--text-secondary); }

    /* ── Issue Card ── */
    .issue-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 20px;
      margin-bottom: 12px; box-shadow: var(--shadow-sm);
      cursor: pointer; transition: all 0.15s;
    }
    .issue-card:hover { border-color: var(--primary-border); box-shadow: var(--shadow); }
    .issue-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .issue-card-title { font-size: 15px; font-weight: 600; flex: 1; }
    .issue-card-meta { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); }
    .issue-card-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 10px; }
    .issue-card-footer { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    /* ── Issue Form ── */
    .form-group { margin-bottom: 20px; }
    .form-label {
      display: block; font-size: 13px; font-weight: 600;
      color: var(--text-secondary); margin-bottom: 6px;
    }
    .form-input, .form-textarea, .form-select {
      width: 100%; padding: 10px 14px;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      font-size: 14px; font-family: inherit; color: var(--text);
      background: var(--surface); outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus, .form-textarea:focus, .form-select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
    }
    .form-textarea { min-height: 180px; resize: vertical; font-family: 'JetBrains Mono', monospace; font-size: 13px; }

    /* ── Markdown Editor with Preview ── */
    .md-editor { border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
    .md-editor-tabs {
      display: flex; background: var(--bg); border-bottom: 1px solid var(--border);
    }
    .md-editor-tab {
      padding: 8px 16px; font-size: 13px; font-weight: 600; font-family: inherit;
      border: none; background: none; color: var(--text-muted); cursor: pointer;
      border-bottom: 2px solid transparent; transition: all 0.15s;
    }
    .md-editor-tab:hover { color: var(--text-secondary); }
    .md-editor-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
    .md-editor .form-textarea {
      border: none; border-radius: 0; min-height: 200px;
    }
    .md-editor .form-textarea:focus { box-shadow: none; }
    .md-preview {
      min-height: 200px; padding: 12px 14px;
      font-size: 14px; line-height: 1.7; color: var(--text);
      background: var(--surface); overflow-y: auto; max-height: 400px;
    }
    .md-preview h1 { font-size: 20px; font-weight: 700; margin: 16px 0 8px; }
    .md-preview h2 { font-size: 17px; font-weight: 700; margin: 14px 0 6px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
    .md-preview h3 { font-size: 15px; font-weight: 600; margin: 12px 0 6px; }
    .md-preview p { margin-bottom: 10px; }
    .md-preview ul, .md-preview ol { margin-bottom: 10px; padding-left: 20px; }
    .md-preview li { margin-bottom: 3px; }
    .md-preview code {
      font-family: 'JetBrains Mono', monospace; font-size: 13px;
      background: var(--bg); padding: 2px 5px; border-radius: 4px;
      border: 1px solid var(--border);
    }
    .md-preview pre {
      background: var(--header-bg); color: #e2e8f0;
      padding: 14px; border-radius: var(--radius-sm);
      overflow-x: auto; margin-bottom: 12px;
    }
    .md-preview pre code { background: none; border: none; padding: 0; color: inherit; }
    .md-preview blockquote {
      border-left: 3px solid var(--primary); padding: 8px 14px; margin: 10px 0;
      background: var(--primary-bg); border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      color: var(--text-secondary); font-size: 13px;
    }
    .md-preview table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
    .md-preview th, .md-preview td { padding: 6px 10px; border: 1px solid var(--border); text-align: left; font-size: 13px; }
    .md-preview thead { background: var(--bg); }
    .md-preview img { max-width: 100%; border-radius: var(--radius-sm); }
    .md-preview .md-empty { color: var(--text-muted); font-style: italic; }
    .md-hint { font-size: 11px; color: var(--text-muted); margin-top: 6px; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 20px; border: none; border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: #2563eb; }
    .btn-secondary { background: var(--bg); color: var(--text-secondary); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--surface); }
    .btn-danger { background: var(--red); color: white; }
    .btn-danger:hover { background: #dc2626; }
    .btn-sm { padding: 5px 12px; font-size: 12px; }

    /* ── Issue Detail ── */
    .issue-detail-header { margin-bottom: 24px; }
    .issue-detail-title { font-size: 22px; font-weight: 700; margin-bottom: 12px; }
    .issue-detail-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .issue-detail-dates { font-size: 12px; color: var(--text-muted); }
    .issue-detail-body {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px;
      font-size: 14px; line-height: 1.7;
      margin-bottom: 20px;
    }
    .issue-detail-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    /* ── Troubleshooting Styles ── */
    .article-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px; padding-bottom: 24px;
    }
    .article-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px;
      box-shadow: var(--shadow-sm); cursor: pointer;
      transition: all 0.15s;
    }
    .article-card:hover { border-color: var(--primary-border); box-shadow: var(--shadow); transform: translateY(-1px); }
    .article-card-title { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
    .article-card-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .category-pill {
      display: inline-block; font-size: 11px; font-weight: 600;
      color: var(--primary-dark); background: var(--primary-bg);
      border: 1px solid var(--primary-border);
      padding: 2px 10px; border-radius: 20px;
    }
    .tag-pill {
      display: inline-block; font-size: 10px; font-weight: 500;
      color: var(--text-secondary); background: var(--bg);
      border: 1px solid var(--border);
      padding: 2px 8px; border-radius: 20px;
    }
    .article-card-snippet { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
    .article-card-keys { margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap; }

    /* ── Article Detail ── */
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 600; color: var(--primary);
      background: none; border: none; cursor: pointer;
      padding: 6px 0; margin-bottom: 16px; font-family: inherit;
    }
    .back-btn:hover { text-decoration: underline; }
    .article-detail-header { margin-bottom: 24px; }
    .article-detail-title { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
    .article-detail-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }

    .article-body { font-size: 14px; line-height: 1.8; color: var(--text); }
    .article-body h1 { font-size: 22px; font-weight: 700; margin: 28px 0 14px; }
    .article-body h2 { font-size: 18px; font-weight: 700; margin: 24px 0 12px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
    .article-body h3 { font-size: 15px; font-weight: 600; margin: 20px 0 10px; }
    .article-body p { margin-bottom: 14px; }
    .article-body ul, .article-body ol { margin-bottom: 14px; padding-left: 24px; }
    .article-body li { margin-bottom: 4px; }
    .article-body code {
      font-family: 'JetBrains Mono', monospace; font-size: 13px;
      background: var(--bg); padding: 2px 6px; border-radius: 4px;
      border: 1px solid var(--border);
    }
    .article-body pre {
      background: var(--header-bg); color: #e2e8f0;
      padding: 16px; border-radius: var(--radius-sm);
      overflow-x: auto; margin-bottom: 16px;
    }
    .article-body pre code { background: none; border: none; padding: 0; color: inherit; }
    .article-body img {
      max-width: 100%; border-radius: var(--radius-sm);
      border: 1px solid var(--border); margin: 14px 0;
    }
    .article-body table { margin-bottom: 16px; }
    .article-body th, .article-body td {
      padding: 8px 12px; border: 1px solid var(--border);
    }
    .article-body blockquote {
      border-left: 3px solid var(--primary);
      padding: 10px 16px; margin: 14px 0;
      background: var(--primary-bg); border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      color: var(--text-secondary); font-size: 13px;
    }

    .attachment-list { margin-top: 24px; }
    .attachment-list-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--text-secondary); }
    .attachment-link {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 16px; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      font-size: 13px; color: var(--primary); text-decoration: none;
      transition: all 0.15s; margin-right: 8px; margin-bottom: 8px;
    }
    .attachment-link:hover { background: var(--primary-bg); border-color: var(--primary-border); }

    .empty-state {
      text-align: center; padding: 80px 20px; color: var(--text-muted);
    }
    .empty-state-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state-title { font-size: 18px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; }
    .empty-state-desc { font-size: 14px; line-height: 1.6; }

    /* ── Filter Bar ── */
    .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-chip {
      padding: 5px 14px; border: 1px solid var(--border);
      border-radius: 20px; font-size: 12px; font-weight: 500;
      background: var(--surface); color: var(--text-secondary);
      cursor: pointer; font-family: inherit; transition: all 0.15s;
    }
    .filter-chip:hover { border-color: var(--primary-border); color: var(--primary); }
    .filter-chip.active {
      background: var(--primary-bg); color: var(--primary-dark);
      border-color: var(--primary-border);
    }

    /* ── Release Notes Styles ── */
    .rn-version-badge {
      display: inline-block; font-family: 'JetBrains Mono', monospace;
      font-size: 11px; font-weight: 600; color: var(--primary-dark);
      background: var(--primary-bg); border: 1px solid var(--primary-border);
      padding: 2px 8px; border-radius: 4px; white-space: nowrap;
    }
    .rn-date { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .tab-btn .rn-version-badge { font-size: 10px; padding: 1px 6px; }
    .rn-body { font-size: 14px; line-height: 1.8; color: var(--text); }
    .rn-body h1 {
      font-size: 22px; font-weight: 700; margin-bottom: 4px;
      padding-bottom: 12px; border-bottom: 2px solid var(--primary-border);
    }
    .rn-body h2 { font-size: 17px; font-weight: 700; margin: 24px 0 10px; color: var(--text-secondary); }
    .rn-body h3 { font-size: 14px; font-weight: 700; margin: 20px 0 8px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); }
    .rn-body p { margin-bottom: 10px; }
    .rn-body ul, .rn-body ol { margin-bottom: 12px; padding-left: 22px; }
    .rn-body li { margin-bottom: 5px; }
    .rn-body hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
    .rn-body em { color: var(--text-secondary); }
    .rn-body strong { color: var(--text); }
    .rn-body code {
      font-family: 'JetBrains Mono', monospace; font-size: 13px;
      background: var(--bg); padding: 2px 6px; border-radius: 4px;
      border: 1px solid var(--border);
    }
    .rn-nav { display: flex; gap: 8px; margin-bottom: 16px; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="header-inner">
      <div class="header-title-group">
        <div class="header-icon">📄</div>
        <div>
          <div class="header-title">HouseHill</div>
          <div class="header-subtitle">Version: 20260319</div>
        </div>
      </div>
      <nav class="top-nav">
        <a class="top-nav-btn" href="#config" data-page="config">⚙️ Configuration</a>
        <a class="top-nav-btn" href="#issues" data-page="issues">📋 Issues</a>
        <a class="top-nav-btn" href="#troubleshooting" data-page="troubleshooting">🔧 Troubleshooting</a>
        <a class="top-nav-btn" href="#release-notes" data-page="release-notes">📦 Release Notes</a>
      </nav>
      <div class="header-right">
        <div class="search-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="searchInput" type="text" placeholder="搜尋參數或說明..." />
        </div>
        <div class="user-info">
          <span class="user-avatar" id="userAvatar"></span>
          <span class="user-name" id="userName"></span>
          <button class="logout-btn" id="logoutBtn" title="Sign out">⏻</button>
        </div>
      </div>
    </div>
  </header>

  <!-- ============ PAGE: Configuration ============ -->
  <div id="page-config" class="page-container active">
    <div class="layout">
      <nav class="sidebar">
        <div class="sidebar-label">設定類別</div>
        <div id="tabList" class="tab-list"></div>
        <div class="tip-box">
          <div class="tip-header">⚠️ 溫馨提示</div>
          <p>大部分參數修改後需<strong>重啟應用程式</strong>方能生效。修改前請務必備份原始設定檔。</p>
        </div>
      </nav>
      <main class="content">
        <div class="breadcrumb">
          <span>設定類別</span>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
          <span id="breadcrumbTitle" class="current"></span>
        </div>
        <div class="status-bar">
          <span id="statusPill" class="status-pill"></span>
        </div>
        <div id="contentArea"></div>
      </main>
    </div>
  </div>

  <!-- ============ PAGE: Issues ============ -->
  <div id="page-issues" class="page-container">
    <div class="layout">
      <nav class="sidebar">
        <div class="sidebar-label">Issues</div>
        <div id="issueTabList" class="tab-list"></div>
      </nav>
      <main class="content" id="issuesContent"></main>
    </div>
  </div>

  <!-- ============ PAGE: Troubleshooting ============ -->
  <div id="page-troubleshooting" class="page-container">
    <div class="layout">
      <nav class="sidebar">
        <div class="sidebar-label">Categories</div>
        <div id="tsTabList" class="tab-list"></div>
      </nav>
      <main class="content" id="tsContent"></main>
    </div>
  </div>

  <!-- ============ PAGE: Release Notes ============ -->
  <div id="page-release-notes" class="page-container">
    <div class="layout">
      <nav class="sidebar">
        <div class="sidebar-label">Versions</div>
        <div id="rnTabList" class="tab-list"></div>
      </nav>
      <main class="content" id="rnContent"></main>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script>
    // ══════════════════════════════════════════════
    // Data & State
    // ══════════════════════════════════════════════
    let DATA = {};

    let activePage = 'config';
    let searchQuery = '';

    const $search = document.getElementById('searchInput');

    // ══════════════════════════════════════════════
    // Shared Utilities
    // ══════════════════════════════════════════════
    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function relativeTime(isoStr) {
      const d = new Date(isoStr);
      const now = new Date();
      const diffMs = now - d;
      const mins = Math.floor(diffMs / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return mins + 'm ago';
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return hrs + 'h ago';
      const days = Math.floor(hrs / 24);
      if (days < 7) return days + 'd ago';
      return d.toLocaleDateString();
    }

    function navigateToConfigKey(key) {
      switchPage('config');
      $search.value = key;
      searchQuery = key;
      renderConfig();
    }

    // ══════════════════════════════════════════════
    // Page Switching (hash-based routing)
    // ══════════════════════════════════════════════
    const SEARCH_PLACEHOLDERS = {
      config: '搜尋參數或說明...',
      issues: '搜尋 Issues...',
      troubleshooting: '搜尋文章...'
    };

    function switchPage(page, updateHash = true) {
      activePage = page;
      searchQuery = '';
      $search.value = '';
      $search.placeholder = SEARCH_PLACEHOLDERS[page] || '';

      document.querySelectorAll('.page-container').forEach(el => {
        const isActive = el.id === 'page-' + page;
        el.classList.toggle('active', isActive);
        el.style.display = isActive ? '' : 'none';
      });
      document.querySelectorAll('.top-nav-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.page === page);
      });

      if (updateHash) {
        window.location.hash = '#' + page;
      }

      if (page === 'config') renderConfig();
      else if (page === 'issues') { buildIssueSidebar(); renderIssuesPage(); }
      else if (page === 'troubleshooting') { loadTsCategories(); renderTsPage(); }
      else if (page === 'release-notes') { loadRnPage(); }
    }

    // Intercept nav link clicks
    document.querySelectorAll('.top-nav-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.preventDefault();
        switchPage(btn.dataset.page);
      });
    });

    // Handle browser back/forward (hash change)
    window.addEventListener('hashchange', () => {
      const page = (window.location.hash || '#config').substring(1) || 'config';
      switchPage(page, false);
    });

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', () => {
      clearToken();
      window.location.href = 'login.html';
    });

    // ══════════════════════════════════════════════
    // Config Viewer
    // ══════════════════════════════════════════════
    const TAB_ICONS = ['⚙️','🛡️','🖼️','🔧','🖱️','💾','📐','🖥️'];
    let tabs = [];
    let activeTab = '';

    const $tabList    = document.getElementById('tabList');
    const $breadcrumb = document.getElementById('breadcrumbTitle');
    const $status     = document.getElementById('statusPill');
    const $content    = document.getElementById('contentArea');

    function buildConfigSidebar() {
      $tabList.innerHTML = '';
      tabs.forEach((tab, i) => {
        const btn = document.createElement('button');
        btn.className = 'tab-btn' + (tab === activeTab ? ' active' : '');
        btn.innerHTML = `
          <span class="tab-icon">${TAB_ICONS[i % TAB_ICONS.length]}</span>
          <span>${tab}</span>
          <span class="tab-count">${DATA[tab].length}</span>
        `;
        btn.onclick = () => { activeTab = tab; searchQuery = ''; $search.value = ''; renderConfig(); };
        $tabList.appendChild(btn);
      });
    }

    function fmtDefault(val) {
      const v = (val || '').trim();
      if (v === 'Yes') return `<span class="val-yes">Yes</span>`;
      if (v === 'No')  return `<span class="val-no">No</span>`;
      if (!v) return `<span class="val-empty">-</span>`;
      return `<span class="val-default">${escHtml(v)}</span>`;
    }

    function fmtAttr(val) {
      const v = (val || '').trim();
      if (!v) return `<span class="val-empty">-</span>`;
      return `<span class="attr-pill">${escHtml(v)}</span>`;
    }

    function fmtOptions(val) {
      const v = (val || '').trim();
      if (!v) return `<span class="val-empty">-</span>`;
      return `<span class="range-pill">${escHtml(v)}</span>`;
    }

    function fmtUI(val) {
      const v = (val || '').trim().toUpperCase();
      if (v === 'YES') return `<span class="ui-yes">YES</span>`;
      return `<span class="val-empty">-</span>`;
    }

    function renderConfig() {
      buildConfigSidebar();
      $breadcrumb.textContent = activeTab;

      const items = DATA[activeTab] || [];
      const q = searchQuery.toLowerCase();
      const filtered = items.filter(it =>
        it.key.toLowerCase().includes(q) ||
        it.description.toLowerCase().includes(q) ||
        it.attribute.toLowerCase().includes(q) ||
        it.options.toLowerCase().includes(q) ||
        it.default.toLowerCase().includes(q)
      );

      $status.textContent = `找到 ${filtered.length} 項參數`;

      const groups = {};
      filtered.forEach(it => {
        if (!groups[it.section]) groups[it.section] = [];
        groups[it.section].push(it);
      });

      const sectionKeys = Object.keys(groups);
      if (sectionKeys.length === 0) {
        $content.innerHTML = `
          <div class="no-results">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <p>找不到符合「${escHtml(searchQuery)}」的參數</p>
          </div>`;
        return;
      }

      let html = '';
      sectionKeys.forEach(sec => {
        html += `<div class="section-card">`;
        html += `<div class="section-header">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/></svg>
          ${escHtml(sec)}
        </div>`;
        html += `<div style="overflow-x:auto"><table><thead><tr>
          <th style="width:16%">參數名稱 (Key)</th>
          <th style="width:28%">功能說明</th>
          <th style="width:8%">屬性</th>
          <th style="width:20%">選項 / 範圍</th>
          <th style="width:16%">預設值</th>
          <th style="width:12%">可介面設定</th>
        </tr></thead><tbody>`;

        groups[sec].forEach(it => {
          html += `<tr>
            <td><span class="key-badge">${escHtml(it.key)}</span></td>
            <td><div class="desc-text">${escHtml(it.description) || '<span class="val-empty">-</span>'}</div></td>
            <td>${fmtAttr(it.attribute)}</td>
            <td>${fmtOptions(it.options)}</td>
            <td>${fmtDefault(it.default)}</td>
            <td>${fmtUI(it.ui_settable)}</td>
          </tr>`;
        });

        html += `</tbody></table></div></div>`;
      });

      $content.innerHTML = html;
    }

    // ══════════════════════════════════════════════
    // Issues Module
    // ══════════════════════════════════════════════
    let issueView = 'dashboard';
    let issueDetailId = null;
    let issueFilterSeverity = '';
    let issueFilterStatus = '';

    const $issueTabList = document.getElementById('issueTabList');
    const $issuesContent = document.getElementById('issuesContent');

    const ISSUE_TABS = [
      { id: 'dashboard', icon: '📊', label: 'Dashboard' },
      { id: 'list', icon: '📋', label: 'All Issues' },
      { id: 'create', icon: '➕', label: 'Report Issue' },
    ];

    function buildIssueSidebar() {
      $issueTabList.innerHTML = '';
      ISSUE_TABS.forEach(t => {
        const btn = document.createElement('button');
        btn.className = 'tab-btn' + (issueView === t.id || (issueView === 'detail' && t.id === 'list') ? ' active' : '');
        btn.innerHTML = `<span class="tab-icon">${t.icon}</span><span>${t.label}</span>`;
        btn.onclick = () => { issueView = t.id; issueDetailId = null; buildIssueSidebar(); renderIssuesPage(); };
        $issueTabList.appendChild(btn);
      });
    }

    async function renderIssuesPage() {
      if (issueView === 'dashboard') await renderIssueDashboard();
      else if (issueView === 'list') await renderIssueList();
      else if (issueView === 'create') renderIssueForm();
      else if (issueView === 'detail') await renderIssueDetail();
    }

    // ── Dashboard ──
    async function renderIssueDashboard() {
      try {
        const stats = await apiFetch('/api/issues/stats').then(r => r.json());
        let html = `
          <div class="breadcrumb">
            <span>Issues</span>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
            <span class="current">Dashboard</span>
          </div>

          <div class="stats-grid">
            <div class="stat-card total">
              <div class="stat-value">${stats.total}</div>
              <div class="stat-label">Total Issues</div>
            </div>
            <div class="stat-card open">
              <div class="stat-value" style="color:var(--amber)">${stats.by_status.open || 0}</div>
              <div class="stat-label">Open</div>
            </div>
            <div class="stat-card in-progress">
              <div class="stat-value" style="color:var(--purple)">${stats.by_status['in-progress'] || 0}</div>
              <div class="stat-label">In Progress</div>
            </div>
            <div class="stat-card resolved">
              <div class="stat-value" style="color:var(--green)">${stats.by_status.resolved || 0}</div>
              <div class="stat-label">Resolved</div>
            </div>
          </div>
        `;

        const maxSev = Math.max(stats.by_severity.critical || 0, stats.by_severity.high || 0, stats.by_severity.medium || 0, stats.by_severity.low || 0, 1);
        const sevColors = { critical: 'var(--red)', high: 'var(--amber)', medium: 'var(--primary)', low: 'var(--green)' };
        html += `<div class="section-card"><div class="section-header">Severity Breakdown</div><div style="padding:20px"><div class="bar-chart">`;
        ['critical', 'high', 'medium', 'low'].forEach(sev => {
          const count = stats.by_severity[sev] || 0;
          const pct = (count / maxSev) * 100;
          html += `<div class="bar-row">
            <span class="bar-label">${sev.charAt(0).toUpperCase() + sev.slice(1)}</span>
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${sevColors[sev]}"></div></div>
            <span class="bar-count">${count}</span>
          </div>`;
        });
        html += `</div></div></div>`;

        html += `<div class="section-card"><div class="section-header">Recent Activity</div>`;
        if (stats.recent && stats.recent.length > 0) {
          html += `<div style="overflow-x:auto"><table><thead><tr>
            <th>Title</th><th>Severity</th><th>Status</th><th>Updated</th>
          </tr></thead><tbody>`;
          stats.recent.forEach(issue => {
            html += `<tr style="cursor:pointer" onclick="issueView='detail';issueDetailId='${issue.id}';buildIssueSidebar();renderIssuesPage()">
              <td><strong>${escHtml(issue.title)}</strong></td>
              <td><span class="severity-badge severity-${issue.severity}">${issue.severity}</span></td>
              <td><span class="status-badge status-${issue.status}">${issue.status}</span></td>
              <td style="color:var(--text-muted);font-size:12px">${relativeTime(issue.updated_at)}</td>
            </tr>`;
          });
          html += `</tbody></table></div>`;
        } else {
          html += `<div style="padding:40px;text-align:center;color:var(--text-muted)">No issues reported yet.</div>`;
        }
        html += `</div>`;

        $issuesContent.innerHTML = html;
      } catch (e) {
        $issuesContent.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-title">Unable to load dashboard</div><div class="empty-state-desc">${escHtml(e.message)}</div></div>`;
      }
    }

    // ── Issue List ──
    async function renderIssueList() {
      try {
        const params = new URLSearchParams();
        if (searchQuery) params.set('q', searchQuery);
        if (issueFilterSeverity) params.set('severity', issueFilterSeverity);
        if (issueFilterStatus) params.set('status', issueFilterStatus);

        const issues = await apiFetch('/api/issues?' + params.toString()).then(r => r.json());

        let html = `
          <div class="breadcrumb">
            <span>Issues</span>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
            <span class="current">All Issues</span>
          </div>
          <div class="filter-bar">
            <button class="filter-chip ${!issueFilterStatus ? 'active' : ''}" onclick="issueFilterStatus='';renderIssueList()">All</button>
            <button class="filter-chip ${issueFilterStatus==='open' ? 'active' : ''}" onclick="issueFilterStatus='open';renderIssueList()">Open</button>
            <button class="filter-chip ${issueFilterStatus==='in-progress' ? 'active' : ''}" onclick="issueFilterStatus='in-progress';renderIssueList()">In Progress</button>
            <button class="filter-chip ${issueFilterStatus==='resolved' ? 'active' : ''}" onclick="issueFilterStatus='resolved';renderIssueList()">Resolved</button>
            <span style="width:1px;background:var(--border);margin:0 4px"></span>
            <button class="filter-chip ${!issueFilterSeverity ? 'active' : ''}" onclick="issueFilterSeverity='';renderIssueList()">All Severity</button>
            <button class="filter-chip ${issueFilterSeverity==='critical' ? 'active' : ''}" onclick="issueFilterSeverity='critical';renderIssueList()">Critical</button>
            <button class="filter-chip ${issueFilterSeverity==='high' ? 'active' : ''}" onclick="issueFilterSeverity='high';renderIssueList()">High</button>
            <button class="filter-chip ${issueFilterSeverity==='medium' ? 'active' : ''}" onclick="issueFilterSeverity='medium';renderIssueList()">Medium</button>
            <button class="filter-chip ${issueFilterSeverity==='low' ? 'active' : ''}" onclick="issueFilterSeverity='low';renderIssueList()">Low</button>
          </div>
          <div class="status-bar"><span class="status-pill">${issues.length} issues</span></div>
        `;

        if (issues.length === 0) {
          html += `<div class="empty-state">
            <div class="empty-state-icon">📋</div>
            <div class="empty-state-title">No issues found</div>
            <div class="empty-state-desc">No issues match your current filters.</div>
          </div>`;
        } else {
          issues.forEach(issue => {
            html += `<div class="issue-card" onclick="issueView='detail';issueDetailId='${issue.id}';buildIssueSidebar();renderIssuesPage()">
              <div class="issue-card-header">
                <span class="issue-card-title">${escHtml(issue.title)}</span>
                <span class="issue-card-meta">${relativeTime(issue.updated_at)}</span>
              </div>
              ${issue.description ? `<div class="issue-card-desc">${escHtml(issue.description.substring(0, 150))}${issue.description.length > 150 ? '...' : ''}</div>` : ''}
              <div class="issue-card-footer">
                <span class="severity-badge severity-${issue.severity}">${issue.severity}</span>
                <span class="status-badge status-${issue.status}">${issue.status}</span>
                ${issue.related_config_key ? `<span class="key-badge clickable" onclick="event.stopPropagation();navigateToConfigKey('${escHtml(issue.related_config_key)}')">${escHtml(issue.related_config_key)}</span>` : ''}
              </div>
            </div>`;
          });
        }

        $issuesContent.innerHTML = html;
      } catch (e) {
        $issuesContent.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-title">Error</div><div class="empty-state-desc">${escHtml(e.message)}</div></div>`;
      }
    }

    // ── Issue Form ──
    function renderIssueForm() {
      const allKeys = [];
      Object.values(DATA).forEach(items => {
        items.forEach(it => { if (it.key && it.key !== '-') allKeys.push(it.key); });
      });

      let optionsHtml = allKeys.map(k => `<option value="${escHtml(k)}">`).join('');

      $issuesContent.innerHTML = `
        <div class="breadcrumb">
          <span>Issues</span>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
          <span class="current">Report Issue</span>
        </div>
        <div class="section-card" style="max-width:640px">
          <div class="section-header">New Issue Report</div>
          <div style="padding:24px">
            <form id="issueForm" onsubmit="submitIssue(event)">
              <div class="form-group">
                <label class="form-label">Title *</label>
                <input class="form-input" name="title" required placeholder="Brief summary of the issue" />
              </div>
              <div class="form-group">
                <label class="form-label">Description <span style="font-weight:400;color:var(--text-muted)">(supports Markdown)</span></label>
                <div class="md-editor">
                  <div class="md-editor-tabs">
                    <button type="button" class="md-editor-tab active" onclick="switchEditorTab(this,'write')">Write</button>
                    <button type="button" class="md-editor-tab" onclick="switchEditorTab(this,'preview')">Preview</button>
                  </div>
                  <textarea class="form-textarea" id="issueDescTextarea" name="description" placeholder="Detailed description, steps to reproduce, expected behavior...&#10;&#10;Supports **bold**, *italic*, \`code\`, lists, tables, etc."></textarea>
                  <div class="md-preview" id="issueDescPreview" style="display:none"></div>
                </div>
                <div class="md-hint">Tip: Use **bold**, *italic*, \`code\`, - lists, > quotes, ### headings</div>
              </div>
              <div style="display:flex;gap:16px">
                <div class="form-group" style="flex:1">
                  <label class="form-label">Severity</label>
                  <select class="form-select" name="severity">
                    <option value="medium">Medium</option>
                    <option value="low">Low</option>
                    <option value="high">High</option>
                    <option value="critical">Critical</option>
                  </select>
                </div>
                <div class="form-group" style="flex:1">
                  <label class="form-label">Related Config Key</label>
                  <input class="form-input" name="related_config_key" list="configKeysList" placeholder="Optional" />
                  <datalist id="configKeysList">${optionsHtml}</datalist>
                </div>
              </div>
              <div style="display:flex;gap:8px;justify-content:flex-end">
                <button type="button" class="btn btn-secondary" onclick="issueView='list';buildIssueSidebar();renderIssuesPage()">Cancel</button>
                <button type="submit" class="btn btn-primary">Submit Issue</button>
              </div>
            </form>
          </div>
        </div>
      `;
    }

    // ── Markdown Editor Helpers ──
    function renderMarkdown(text) {
      if (typeof marked !== 'undefined' && marked.parse) {
        return marked.parse(text || '');
      }
      return escHtml(text || '').replace(/\n/g, '<br>');
    }

    function switchEditorTab(btn, mode) {
      const editor = btn.closest('.md-editor');
      editor.querySelectorAll('.md-editor-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');

      const textarea = editor.querySelector('textarea');
      const preview = editor.querySelector('.md-preview');

      if (mode === 'write') {
        textarea.style.display = '';
        preview.style.display = 'none';
      } else {
        const text = textarea.value;
        preview.innerHTML = text.trim()
          ? renderMarkdown(text)
          : '<span class="md-empty">Nothing to preview</span>';
        textarea.style.display = 'none';
        preview.style.display = '';
      }
    }

    async function submitIssue(e) {
      e.preventDefault();
      const form = e.target;
      const body = {
        title: form.title.value,
        description: form.description.value,
        severity: form.severity.value,
        related_config_key: form.related_config_key.value,
      };
      try {
        const res = await apiFetch('/api/issues', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (!res.ok) throw new Error('Failed to create issue');
        issueView = 'list';
        buildIssueSidebar();
        renderIssuesPage();
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    // ── Issue Detail ──
    async function renderIssueDetail() {
      if (!issueDetailId) { issueView = 'list'; renderIssueList(); return; }
      try {
        const issue = await apiFetch('/api/issues/' + issueDetailId).then(r => r.json());
        if (issue.error) throw new Error(issue.error);

        const statusOptions = ['open', 'in-progress', 'resolved'];

        $issuesContent.innerHTML = `
          <button class="back-btn" onclick="issueView='list';buildIssueSidebar();renderIssuesPage()">← Back to All Issues</button>
          <div class="issue-detail-header">
            <div class="issue-detail-title">${escHtml(issue.title)}</div>
            <div class="issue-detail-badges">
              <span class="severity-badge severity-${issue.severity}">${issue.severity}</span>
              <span class="status-badge status-${issue.status}">${issue.status}</span>
              ${issue.related_config_key ? `<span class="key-badge clickable" onclick="navigateToConfigKey('${escHtml(issue.related_config_key)}')">${escHtml(issue.related_config_key)}</span>` : ''}
            </div>
            <div class="issue-detail-dates">
              Created: ${new Date(issue.created_at).toLocaleString()} &nbsp;|&nbsp; Updated: ${relativeTime(issue.updated_at)}
            </div>
          </div>
          <div class="issue-detail-body md-preview">${issue.description ? renderMarkdown(issue.description) : '<span class="md-empty">No description provided.</span>'}</div>
          <div class="issue-detail-actions">
            <span style="font-size:13px;font-weight:600;color:var(--text-secondary);margin-right:8px;align-self:center">Change Status:</span>
            ${statusOptions.map(s => `
              <button class="btn btn-sm ${issue.status === s ? 'btn-primary' : 'btn-secondary'}"
                onclick="updateIssueStatus('${issue.id}','${s}')">${s}</button>
            `).join('')}
            <span style="flex:1"></span>
            <button class="btn btn-sm btn-danger" onclick="deleteIssue('${issue.id}')">Delete</button>
          </div>
        `;
      } catch (e) {
        $issuesContent.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-title">Issue not found</div></div>`;
      }
    }

    async function updateIssueStatus(id, status) {
      await apiFetch('/api/issues/' + id, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status }),
      });
      renderIssueDetail();
    }

    async function deleteIssue(id) {
      if (!confirm('Are you sure you want to delete this issue?')) return;
      await apiFetch('/api/issues/' + id, { method: 'DELETE' });
      issueView = 'list';
      issueDetailId = null;
      buildIssueSidebar();
      renderIssuesPage();
    }

    // ══════════════════════════════════════════════
    // Troubleshooting Module
    // ══════════════════════════════════════════════
    let tsView = 'list';
    let tsActiveCategory = '';
    let tsCategories = [];
    let tsArticleSlug = null;

    const $tsTabList = document.getElementById('tsTabList');
    const $tsContent = document.getElementById('tsContent');

    async function loadTsCategories() {
      try {
        tsCategories = await apiFetch('/api/troubleshooting/categories').then(r => r.json());
      } catch (e) {
        tsCategories = [];
      }
      buildTsSidebar();
    }

    function buildTsSidebar() {
      $tsTabList.innerHTML = '';
      const allBtn = document.createElement('button');
      allBtn.className = 'tab-btn' + (!tsActiveCategory ? ' active' : '');
      allBtn.innerHTML = `<span class="tab-icon">📚</span><span>All Articles</span>`;
      allBtn.onclick = () => { tsActiveCategory = ''; tsView = 'list'; buildTsSidebar(); renderTsPage(); };
      $tsTabList.appendChild(allBtn);

      tsCategories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'tab-btn' + (tsActiveCategory === cat ? ' active' : '');
        btn.innerHTML = `<span class="tab-icon">📁</span><span>${escHtml(cat)}</span>`;
        btn.onclick = () => { tsActiveCategory = cat; tsView = 'list'; buildTsSidebar(); renderTsPage(); };
        $tsTabList.appendChild(btn);
      });
    }

    async function renderTsPage() {
      if (tsView === 'list') await renderTsArticleList();
      else if (tsView === 'detail') await renderTsArticleDetail();
    }

    async function renderTsArticleList() {
      try {
        const params = new URLSearchParams();
        if (searchQuery) params.set('q', searchQuery);
        if (tsActiveCategory) params.set('category', tsActiveCategory);

        const articles = await apiFetch('/api/troubleshooting/articles?' + params.toString()).then(r => r.json());

        let html = `
          <div class="breadcrumb">
            <span>Troubleshooting</span>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
            <span class="current">${tsActiveCategory ? escHtml(tsActiveCategory) : 'All Articles'}</span>
          </div>
          <div class="status-bar"><span class="status-pill">${articles.length} articles</span></div>
        `;

        if (articles.length === 0) {
          html += `<div class="empty-state">
            <div class="empty-state-icon">📖</div>
            <div class="empty-state-title">No articles found</div>
            <div class="empty-state-desc">
              ${searchQuery ? 'No articles match your search.' : 'Add Markdown files to the <code>troubleshooting/articles/</code> folder to get started.'}
            </div>
          </div>`;
        } else {
          html += `<div class="article-grid">`;
          articles.forEach(article => {
            html += `<div class="article-card" onclick="tsView='detail';tsArticleSlug='${escHtml(article.slug)}';renderTsPage()">
              <div class="article-card-title">${escHtml(article.title)}</div>
              <div class="article-card-meta">
                ${article.category ? `<span class="category-pill">${escHtml(article.category)}</span>` : ''}
                ${(article.tags || []).map(t => `<span class="tag-pill">${escHtml(t)}</span>`).join('')}
              </div>
              ${article.snippet ? `<div class="article-card-snippet">${escHtml(article.snippet)}</div>` : ''}
              ${article.related_config_keys && article.related_config_keys.length > 0 ? `
                <div class="article-card-keys">
                  ${article.related_config_keys.map(k => `<span class="key-badge" style="font-size:11px;padding:2px 8px">${escHtml(k)}</span>`).join('')}
                </div>` : ''}
            </div>`;
          });
          html += `</div>`;
        }

        $tsContent.innerHTML = html;
      } catch (e) {
        $tsContent.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-title">Error loading articles</div><div class="empty-state-desc">${escHtml(e.message)}</div></div>`;
      }
    }

    async function renderTsArticleDetail() {
      if (!tsArticleSlug) { tsView = 'list'; renderTsArticleList(); return; }
      try {
        const article = await apiFetch('/api/troubleshooting/articles/' + tsArticleSlug).then(r => r.json());
        if (article.error) throw new Error(article.error);

        let html = `
          <button class="back-btn" onclick="tsView='list';tsArticleSlug=null;buildTsSidebar();renderTsPage()">← Back to Articles</button>
          <div class="article-detail-header">
            <div class="article-detail-title">${escHtml(article.title)}</div>
            <div class="article-detail-meta">
              ${article.category ? `<span class="category-pill">${escHtml(article.category)}</span>` : ''}
              ${(article.tags || []).map(t => `<span class="tag-pill">${escHtml(t)}</span>`).join('')}
            </div>
            ${article.related_config_keys && article.related_config_keys.length > 0 ? `
              <div style="margin-top:8px">
                ${article.related_config_keys.map(k => `<span class="key-badge clickable" onclick="navigateToConfigKey('${escHtml(k)}')">${escHtml(k)}</span>`).join(' ')}
              </div>` : ''}
          </div>
          <div class="section-card" style="padding:24px">
            <div class="article-body">${article.html_body}</div>
          </div>
        `;

        if (article.attachments && article.attachments.length > 0) {
          const nonImageAttachments = article.attachments.filter(a => !a.is_image);
          if (nonImageAttachments.length > 0) {
            html += `<div class="attachment-list">
              <div class="attachment-list-title">Attachments</div>
              ${nonImageAttachments.map(a => `
                <a class="attachment-link" href="${API_BASE}/api/troubleshooting/attachments/${encodeURIComponent(a.name)}" download>
                  📎 ${escHtml(a.name)} <span style="color:var(--text-muted);font-size:11px">(${a.size_display})</span>
                </a>
              `).join('')}
            </div>`;
          }
        }

        $tsContent.innerHTML = html;
      } catch (e) {
        $tsContent.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-title">Article not found</div></div>`;
      }
    }

    // ══════════════════════════════════════════════
    // Release Notes Module
    // ══════════════════════════════════════════════
    let rnActiveSlug = null;
    let rnVersions = [];

    const $rnTabList = document.getElementById('rnTabList');
    const $rnContent = document.getElementById('rnContent');

    async function loadRnPage() {
      try {
        rnVersions = await apiFetch('/api/release-notes').then(r => r.json());
        buildRnSidebar();
        if (!rnActiveSlug && rnVersions.length > 0) {
          rnActiveSlug = rnVersions[0].slug;
        }
        await renderRnContent();
      } catch (e) {
        $rnContent.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-title">Failed to load release notes</div><div class="empty-state-desc">${escHtml(e.message)}</div></div>`;
      }
    }

    function buildRnSidebar() {
      $rnTabList.innerHTML = '';
      rnVersions.forEach(v => {
        const btn = document.createElement('button');
        btn.className = 'tab-btn' + (rnActiveSlug === v.slug ? ' active' : '');
        btn.innerHTML = `
          <span class="tab-icon">📦</span>
          <span style="flex:1;min-width:0">
            <span class="rn-version-badge">${escHtml(v.version)}</span>
            <div class="rn-date">${escHtml(v.date)}</div>
          </span>
        `;
        btn.onclick = () => { rnActiveSlug = v.slug; buildRnSidebar(); renderRnContent(); };
        $rnTabList.appendChild(btn);
      });
    }

    async function renderRnContent() {
      if (!rnActiveSlug) {
        $rnContent.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📦</div><div class="empty-state-title">No release notes found</div><div class="empty-state-desc">Place XRESTA Release Note.md in the project root.</div></div>`;
        return;
      }

      const idx = rnVersions.findIndex(v => v.slug === rnActiveSlug);
      const prev = rnVersions[idx + 1] || null;
      const next = rnVersions[idx - 1] || null;

      $rnContent.innerHTML = `<div style="color:var(--text-muted);padding:40px;text-align:center">Loading...</div>`;

      try {
        const v = await apiFetch('/api/release-notes/' + rnActiveSlug).then(r => r.json());
        if (v.error) throw new Error(v.error);

        let html = `
          <div class="breadcrumb">
            <span>Release Notes</span>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
            <span class="current">${escHtml(v.version)}</span>
          </div>
          <div class="rn-nav">
            ${next ? `<button class="btn btn-sm btn-secondary" onclick="rnActiveSlug='${next.slug}';buildRnSidebar();renderRnContent()">← Newer: ${escHtml(next.version)}</button>` : '<span></span>'}
            <span style="flex:1"></span>
            ${prev ? `<button class="btn btn-sm btn-secondary" onclick="rnActiveSlug='${prev.slug}';buildRnSidebar();renderRnContent()">Older: ${escHtml(prev.version)} →</button>` : ''}
          </div>
          <div class="section-card" style="padding:28px 32px">
            <div class="rn-body">${v.html_body}</div>
          </div>
        `;
        $rnContent.innerHTML = html;
      } catch (e) {
        $rnContent.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-title">Error loading version</div><div class="empty-state-desc">${escHtml(e.message)}</div></div>`;
      }
    }

    // ══════════════════════════════════════════════
    // Search Integration
    // ══════════════════════════════════════════════
    $search.addEventListener('input', e => {
      searchQuery = e.target.value;
      if (activePage === 'config') renderConfig();
      else if (activePage === 'issues' && (issueView === 'list' || issueView === 'dashboard')) renderIssuesPage();
      else if (activePage === 'troubleshooting' && tsView === 'list') renderTsPage();
    });

    // ══════════════════════════════════════════════
    // Init
    // ══════════════════════════════════════════════
    async function init() {
      // Auth check
      if (!isLoggedIn()) {
        window.location.href = 'login.html';
        return;
      }

      // Set user display
      const username = getUsername();
      document.getElementById('userAvatar').textContent = username[0].toUpperCase();
      document.getElementById('userName').textContent = username;

      // Load config data from API
      try {
        DATA = await apiFetch('/api/config').then(r => r.json());
      } catch (e) {
        // apiFetch handles 401 redirect; other errors show empty config
        DATA = {};
      }

      tabs = Object.keys(DATA);
      activeTab = tabs[0] || '';

      // Determine page from hash
      activePage = (window.location.hash || '#config').substring(1) || 'config';
      switchPage(activePage, false);
    }

    init();
  </script>
</body>
</html>
