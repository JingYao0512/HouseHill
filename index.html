<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Content Security Policy — locks down what the browser may load.
      - default-src 'self': only same-origin by default
      - script-src 'self': no inline/external scripts; Vite emits hashed bundles
      - style-src: own bundle + Google Fonts CSS; 'unsafe-inline' is needed for
        the small inline <style> blocks Vite injects for HMR-free CSS variables
      - font-src: Google Fonts CDN
      - img-src: own, plus data: URIs (inline SVGs) and blob: (file previews)
      - connect-src: backend API only
      - frame-ancestors 'none' / object-src 'none': anti-clickjacking, anti-Flash
      - base-uri 'self': prevents <base> tag injection
    -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: blob:;
      connect-src 'self' https://househill.de.r.appspot.com;
      frame-ancestors 'none';
      object-src 'none';
      base-uri 'self';
      form-action 'self';
    " />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>HouseHill Summit — 醫療X光軟體指引平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
