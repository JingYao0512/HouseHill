<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src fonts.gstatic.com; connect-src *; img-src 'self' data:;" />
  <title>Login — HouseHill</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --text-secondary: #64748b;
      --text-muted: #94a3b8;
      --primary: #3b82f6;
      --primary-bg: #eff6ff;
      --primary-border: #bfdbfe;
      --primary-dark: #1e40af;
      --header-bg: #0f172a;
      --red: #ef4444;
      --red-bg: #fef2f2;
      --red-border: #fecaca;
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);
      --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1);
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--header-bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(59,130,246,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(124,58,237,0.06) 0%, transparent 50%);
      pointer-events: none;
    }

    .login-card {
      background: var(--surface);
      border-radius: 16px;
      box-shadow: var(--shadow-xl);
      width: 100%;
      max-width: 400px;
      overflow: hidden;
      position: relative;
    }

    .login-header {
      background: var(--header-bg);
      padding: 32px 32px 28px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .login-logo {
      width: 56px; height: 56px;
      background: rgba(59,130,246,0.15);
      border: 1px solid rgba(59,130,246,0.3);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      margin: 0 auto 16px;
    }
    .login-title {
      font-size: 18px; font-weight: 700; color: white; margin-bottom: 4px;
    }
    .login-subtitle { font-size: 12px; color: var(--text-muted); }

    .login-body { padding: 28px 32px 32px; }

    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block; font-size: 13px; font-weight: 600;
      color: var(--text-secondary); margin-bottom: 6px;
    }
    .form-input {
      width: 100%; padding: 10px 14px;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      font-size: 14px; font-family: inherit; color: var(--text);
      background: var(--surface); outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
    }
    .form-input.username-input {
      font-family: 'JetBrains Mono', monospace;
    }

    .btn-login {
      width: 100%; padding: 11px;
      background: var(--primary); color: white;
      border: none; border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: all 0.15s;
      margin-top: 4px;
    }
    .btn-login:hover { background: #2563eb; }
    .btn-login:active { transform: scale(0.99); }

    .error-box {
      background: var(--red-bg); border: 1px solid var(--red-border);
      border-radius: var(--radius-sm); padding: 10px 14px;
      margin-bottom: 18px;
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--red);
      display: none;
    }

    .login-footer {
      text-align: center; margin-top: 20px;
      font-size: 12px; color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">📄</div>
      <div class="login-title">HouseHill</div>
      <div class="login-subtitle">Sign in to continue</div>
    </div>

    <div class="login-body">
      <div class="error-box" id="errorBox">
        <span>⚠</span>
        <span id="errorMsg"></span>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input
            class="form-input username-input"
            id="username"
            type="text" required autocomplete="username"
            placeholder="Enter username"
            autofocus
          />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input
            class="form-input"
            id="password"
            type="password" required autocomplete="current-password"
            placeholder="Enter password"
          />
        </div>
        <button type="submit" class="btn-login">Sign In</button>
      </form>

      <div class="login-footer">
        HouseHill &nbsp;·&nbsp; Version 20260319
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script>
    // If already logged in, go to main page
    if (isLoggedIn()) {
      window.location.href = "index.html";
    }

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const errorBox = document.getElementById("errorBox");
      const errorMsg = document.getElementById("errorMsg");
      errorBox.style.display = "none";

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      try {
        const res = await fetch(API_BASE + "/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();

        if (res.ok && data.token) {
          setToken(data.token, data.username);
          window.location.href = "index.html";
        } else {
          errorMsg.textContent = data.error || "Login failed.";
          errorBox.style.display = "flex";
        }
      } catch (err) {
        errorMsg.textContent = "Unable to connect to server.";
        errorBox.style.display = "flex";
      }
    });
  </script>
</body>
</html>
